services:
  - type: web
    name: asd-backend
    runtime: node
    rootDirectory: .
    buildCommand: npm ci --production=false || npm install
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: PYTHON_BIN
        value: python3
      - key: NPM_CONFIG_LOGLEVEL
        value: verbose
